name: proxy-egress-required
description: |
  Services in security, recon, web_analysis or search categories that make outbound HTTP
  fetches must declare `proxy_egress: true` in service.yaml so the fleet-shared
  Webshare residential-proxy credentials get mounted into their container .env.
  Otherwise outbound calls leak the dockerhost IP — German-DC abuse complaints
  when active scanners or scrapers hit bug-bounty / search targets.

  Opt out per service by adding `proxy_egress: true` (good) OR by moving the
  service out of one of the four covered categories (intentional re-classify).
  Genuinely-direct-egress services (port scanners, SSRF probers) should still
  set `proxy_egress: true` AND wrap their HTTP client with
  safehttp.WithoutProxy() at call sites that legitimately need a direct path.
severity: error
filter:
  category: security|recon|web_analysis|search
  proxy-egress: "false"
type: file-match
file: service.yaml
pattern: "^proxy_egress:\\s*true\\s*$"
